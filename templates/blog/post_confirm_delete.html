{% extends 'blog/base.html' %}
{% block content %}
<div class="container" style="max-width:500px;">
    <div class="card" style="padding:40px; text-align:center;">
        <i class="fas fa-trash-alt" style="font-size:60px; color:#ef4444; margin-bottom:20px;"></i>
        <h2 style="color:#1a1a2e; margin-bottom:12px;">Delete Post?</h2>
        <p style="color:#666; margin-bottom:25px;">Are you sure you want to delete <strong style="color:#7c3aed;">"{{ post.title }}"</strong>? This cannot be undone!</p>
        <form method="POST" style="display:flex; gap:12px; justify-content:center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
            <a href="{% url 'post_detail' post.slug %}" class="btn btn-outline"><i class="fas fa-times"></i> Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
